<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login — Sample Site</title>
  <link rel="stylesheet" href="styles.css" />
  <script defer src="script.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="index.html">SampleSite</a>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="login.html" class="active">Login</a>
        <a href="register.html">Register</a>
      </nav>
      <button class="menu-toggle" aria-label="Toggle menu">☰</button>
    </div>
  </header>

  <main class="container auth-container">
    <form id="loginForm" class="card form-card" action="#" method="post" novalidate>
      <h2>Sign in</h2>

      <div class="form-group">
        <label for="login-username">Username</label>
        <input id="login-username" name="username" type="text" required placeholder="Enter your username" />
        <small class="error" data-error-for="login-username"></small>
      </div>

      <div class="form-group">
        <label for="login-password">Password</label>
        <input id="login-password" name="password" type="password" required placeholder="Enter your password" />
        <small class="error" data-error-for="login-password"></small>
      </div>

      <button class="btn primary" type="submit">Login</button>
      <p class="form-note">Don't have an account? <a href="register.html">Register</a></p>
    </form>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 SampleSite. All rights reserved.</p>
    </div>
  </footer>
</body>
</html>
