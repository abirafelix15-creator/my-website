<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Register — Stardust</title>
  <link rel="stylesheet" href="styles.css" />
  <script defer src="script.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="index.html">SampleSite</a>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
        <a href="register.html" class="active">Register</a>
      </nav>
      <button class="menu-toggle" aria-label="Toggle menu">☰</button>
    </div>
  </header>

  <main class="container auth-container">
    <form id="registerForm" class="card form-card" action="#" method="post" novalidate>
      <h2>Create account</h2>

      <div class="form-group">
        <label for="reg-username">Username</label>
        <input id="reg-username" name="username" type="text" required placeholder="Choose a username" />
        <small class="error" data-error-for="reg-username"></small>
      </div>

      <div class="form-group">
        <label for="reg-email">Email</label>
        <input id="reg-email" name="email" type="email" required placeholder="you@example.com" />
        <small class="error" data-error-for="reg-email"></small>
      </div>

      <div class="form-group">
        <label for="reg-password">Password</label>
        <input id="reg-password" name="password" type="password" required placeholder="At least 8 characters" />
        <small class="error" data-error-for="reg-password"></small>
      </div>

      <div class="form-group">
        <label for="reg-confirm">Confirm password</label>
        <input id="reg-confirm" name="confirm" type="password" required placeholder="Re-enter your password" />
        <small class="error" data-error-for="reg-confirm"></small>
      </div>

      <button class="btn primary" type="submit">Create account</button>
      <p class="form-note">Already have an account? <a href="login.html">Login</a></p>
    </form>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 Stardust lighting up. All rights reserved.</p>
    </div>
  </footer>
</body>
</html>
